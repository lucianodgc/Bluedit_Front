
<div class="container mt-4 card bg-dark text-white border-secondary p-4">
    <div class="d-flex align-items-center mb-5">
        <img 
        [src]="user?.avatarUrl || 'https://api.dicebear.com/7.x/initials/svg?seed=' + user?.username" 
        class="rounded-circle border border-secondary border-opacity-50"
        style="width: 96px; height: 96px; object-fit: cover;">
        <div class="ms-5">
            <h2 class="fw-bold text-white mb-1">{{ user?.username }}</h2>
            <p class="fw-bold text-white-50 mb-1">u/{{ user?.username }}</p>
            
        </div>
        <div class="ms-auto text-end">
            <p class="text-secondary">Joined on <br>{{ user?.createdAt}}</p>
        </div>
    </div>

    <hr class="mb-4 mt-0">

    <h1 class="fw-bold mb-2 text-center">Posts</h1>

    <hr class="mb-0 mt-4">

    <div class="mt-3">
        @for (post of userPosts; track post.id) {
            <app-post-card [post]="post"></app-post-card>
            <hr class="mb-4 mt-4">
        }
    </div>
</div>
